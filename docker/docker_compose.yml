version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: event_logistics_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: event_logistics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event_logistics_network

  # Redis Cache and Celery Broker
        POSTGRES_USER: ${POSTGRES_USER:-postgres}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
        POSTGRES_DB: ${POSTGRES_DB:-event_logistics}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event_logistics_network
      restart: unless-stopped

  # FastAPI Application
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: event_logistics_api
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/event_logistics
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../app:/app/app
          - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-event_logistics}
      - ../chroma_db:/app/chroma_db
    networks:
      - event_logistics_network
    restart: unless-stopped

  # Celery Worker (Optional)
          - "8080:8080"
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: event_logistics_celery
    command: celery -A app.celery_app worker --loglevel=info
        volumes:
          - logs:/app/logs
          - chroma_db:/app/chroma_db
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - ../.env
        healthcheck:
          test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
          interval: 30s
          timeout: 10s
          retries: 3
    depends_on:
      - postgres
      - redis
    volumes:
      - ../app:/app/app
      - ../logs:/app/logs
    networks:
      - event_logistics_network
    restart: unless-stopped
    profiles:
      - with-celery

  # PgAdmin (Optional - for database management)
        - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-event_logistics}
    image: dpage/pgadmin4:latest
    container_name: event_logistics_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eventlogistics.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      volumes:
        - logs:/app/logs
    profiles:
      - with-pgadmin

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  logs:
    driver: local
  chroma_db:
    driver: local

networks:
  event_logistics_network:
    driver: bridge